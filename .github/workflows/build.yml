name: Build pack

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache downloaded jars
        uses: actions/cache@v4
        with:
          path: .build_cache
          key: build-cache-${{ hashFiles('mods/*.pw.toml') }}
          restore-keys: |
            build-cache-

      - name: Build client (.mrpack) + server (.zip)
        run: python scripts/build.py --clean

      - name: List artifacts
        run: ls -lh build/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-${{ github.sha }}
          path: build/
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*
          generate_release_notes: true
