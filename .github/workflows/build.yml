name: Build pack

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: "Publish a GitHub release with the built artifacts"
        type: boolean
        default: true
      tag:
        description: "Release tag (leave blank to use pack.toml version)"
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mrpack: ${{ steps.names.outputs.mrpack }}
      curseforge: ${{ steps.names.outputs.curseforge }}
      version: ${{ steps.names.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache downloaded jars
        uses: actions/cache@v4
        with:
          path: .build_cache
          key: build-cache-${{ hashFiles('mods/*.pw.toml') }}
          restore-keys: |
            build-cache-

      - name: Build mrpack + CurseForge zip
        run: python scripts/build.py --clean

      - name: Capture artifact filenames
        id: names
        run: |
          set -e
          mrpack=$(ls build/*.mrpack | head -1)
          cf=$(ls build/*-curseforge.zip | head -1)
          version=$(python -c "import tomllib;print(tomllib.load(open('pack.toml','rb'))['version'])")
          echo "mrpack=$(basename "$mrpack")" >> "$GITHUB_OUTPUT"
          echo "curseforge=$(basename "$cf")" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          ls -lh build/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-${{ github.sha }}
          path: build/
          if-no-files-found: error
          retention-days: 30

  release:
    # Publish a release only when explicitly asked: tag push OR manual dispatch
    # with `release: true`. Normal pushes just build (artifacts above).
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: modpack-${{ github.sha }}
          path: build

      - name: Decide release tag
        id: tag
        run: |
          set -e
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="v${{ needs.build.outputs.version }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: build/*
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
